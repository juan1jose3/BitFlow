services:
  db:
    image: postgres:16
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=bs_streamer
      - POSTGRES_USER=django_user
      - POSTGRES_PASSWORD=djangopass
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgres://django_user:djangopass@db:5432/bs_streamer
      - DEBUG=True
      - SECRET_KEY=57483975435809685469
    depends_on:
      - db

volumes:
  pgdata:
  media_data: