<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BitFlow{% endblock %}</title>
    <meta name="description" content="BitFlow — Your personal streaming service">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- ─── Navbar ─── -->
    <nav class="navbar">
        <a href="{% url 'streaming:home' %}" class="navbar__brand">
            <span class="navbar__logo">▶</span> BitFlow
        </a>

        <form class="navbar__search" action="{% url 'streaming:home' %}" method="get" id="search-form">
            <input
                type="text"
                name="q"
                class="navbar__search-input"
                placeholder="Search videos..."
                value="{{ search_query|default:'' }}"
                id="search-input"
                autocomplete="off"
            >
            <button type="submit" class="navbar__search-btn" id="search-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
            </button>
        </form>

        <div class="navbar__auth">
            {% if user.is_authenticated %}
                <a href="{% url 'streaming:upload' %}" class="navbar__btn navbar__btn--upload" id="upload-btn">
                    ＋ Upload
                </a>
                <span class="navbar__user">👤 {{ user.username }}</span>
                <a href="{% url 'streaming:logout' %}" class="navbar__btn navbar__btn--outline" id="logout-btn">Logout</a>
            {% else %}
                <a href="{% url 'streaming:login' %}" class="navbar__btn navbar__btn--outline" id="login-btn">Login</a>
                <a href="{% url 'streaming:register' %}" class="navbar__btn navbar__btn--solid" id="register-btn">Register</a>
            {% endif %}
        </div>
    </nav>

    <!-- ─── Main Content ─── -->
    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <!-- ─── Footer ─── -->
    <footer class="footer">
        <p>&copy; 2026 BitFlow. All rights reserved.</p>
    </footer>

    {% block extra_js %}{% endblock %}
</body>
</html>
